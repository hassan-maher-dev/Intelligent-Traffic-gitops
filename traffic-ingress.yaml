apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traffic-ingress
  namespace: traffic-app-ns
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: smarttraffic.hassanmaher.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traffic-dashboard-service
            port:
              number: 80