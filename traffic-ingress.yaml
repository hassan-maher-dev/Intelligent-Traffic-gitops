apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traffic-ingress
  namespace: traffic-app-ns
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:

  # First rule: (without host header)
  #This will catch any traffic coming from the long AWS URL (ELB) or any unknown/unrecognized host
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traffic-dashboard-service
            port:
              number: 80

  #  Second rule: this one is for you when using the fake domain to bypass the firewall
  - host: traffic.aws-internal.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traffic-dashboard-service
            port:
              number: 80